
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon LibreOffice Local</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>Mon Éditeur de Texte Local</h1>
    <div id="toolbar">
      <button onclick="undoAction()"><- Annuler</button>
      <button onclick="redoAction()">Rétablir -></button>
      <button onclick="toggleFormat('bold')"><b>Gras</b></button>
      <button onclick="toggleFormat('italic')"><i>Italique</i></button>
      <button onclick="toggleFormat('underline')"><u>Souligné</u></button>
      <button onclick="formatList('ordered')">Liste numérotée</button>
      <button onclick="formatList('bullet')">Liste à puces</button>
      <button onclick="insertImage()">Insérer une image</button>
      <button onclick="addPage()">Ajouter une page</button>
      <button onclick="saveAsHTML()">Télécharger en HTML</button>
      <input type="file" id="fileInput" accept=".html" style="display: none;" onchange="loadHTMLFile(this)">
      <button onclick="document.getElementById('fileInput').click()">Ouvrir un fichier HTML</button>
    </div>
    <div id="pages">
      <div class="page" contenteditable="false">
        <div class="editor-container"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <script src="script.js"></script>
</body>
</html>
